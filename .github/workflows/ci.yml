name: CI

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'Stagelog_re_backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'Stagelog_re_frontend/**'
              - '.github/workflows/ci.yml'

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Stagelog_re_backend
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Build & test
        run: ./gradlew build      # TestcontainersлҠ” лҹ¬л„Ҳ лӮҙмһҘ DockerлЎң лҸҷмһ‘
      - name: Docker build (verify, no push)
        run: docker build -t stagelog-backend:ci .

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Stagelog_re_frontend
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: Stagelog_re_frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - name: Docker build (verify, no push)
        run: docker build -t stagelog-frontend:ci .

  # лӢЁмқј required check вҖ” мҠӨнӮөлҗң backend/frontendлҠ” success м·Ёкёү, changes мӢӨнҢЁВ·мһЎ мӢӨнҢЁл§Ң л§үлҠ”лӢӨ.
  ci-ok:
    if: always()
    needs: [ changes, backend, frontend ]
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate result
        run: |
          # changes(н•„мҲҳ м„ н–ү)лҠ” л°ҳл“ңмӢң successм—¬м•ј н•ңлӢӨ вҖ” мӢӨнҢЁ мӢң backend/frontendк°Җ skipлҗҳм–ҙ к°Җм§ң greenмқҙ лҗҳлҠ” кө¬л©Қмқ„ л§үлҠ”лӢӨ.
          if [ "${{ needs.changes.result }}" != "success" ] || \
             [ "${{ needs.backend.result }}" = "failure" ] || [ "${{ needs.backend.result }}" = "cancelled" ] || \
             [ "${{ needs.frontend.result }}" = "failure" ] || [ "${{ needs.frontend.result }}" = "cancelled" ]; then
            echo "кІҢмқҙнҠё мӢӨнҢЁ: changes=${{ needs.changes.result }} backend=${{ needs.backend.result }} frontend=${{ needs.frontend.result }}"
            exit 1
          fi
          echo "нҶөкіј (мҠӨнӮөлҗң backend/frontendлҠ” OK): changes=${{ needs.changes.result }} backend=${{ needs.backend.result }} frontend=${{ needs.frontend.result }}"
